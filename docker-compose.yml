version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bet_book_postgres
    environment:
      POSTGRES_DB: bet_book
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bet_book_app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bet_book
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npm run db:push && npm run db:seed && npm run dev"

volumes:
  postgres_data:
